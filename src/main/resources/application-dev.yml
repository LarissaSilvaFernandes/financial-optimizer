spring:
  datasource:
    url: jdbc:h2:file:./data/financial_optimizer_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  liquibase:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:SUA-KEY-AQUI}
      chat:
        options:
          model: claude-haiku-4-5-20251001
          temperature: 0.3

logging:
  level:
    com.hackathon.financialoptimizer: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
